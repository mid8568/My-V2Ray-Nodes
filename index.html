<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 高可用防断流扫描控制台</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; line-height: 1.6; max-width: 950px; margin: 30px auto; padding: 0 20px; background-color: #f4f6f9; color: #333; }
        h1 { color: #0d6efd; border-bottom: 3px solid #0d6efd; padding-bottom: 10px; font-size: 24px; text-align: center; }
        h2 { color: #dc3545; font-size: 18px; border-left: 4px solid #dc3545; padding-left: 10px; margin-top: 25px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .card { background: #fff; padding: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin: 0; font-size: 14px; color: #666; }
        .card p { margin: 8px 0 0 0; font-size: 20px; font-weight: bold; color: #111; }
        .report-box { background: #fff; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background-color: #f8f9fa; font-weight: bold; }
        .badge { background-color: #e9ecef; padding: 3px 8px; border-radius: 4px; font-size: 12px; color: #495057; }
        textarea { width: 100%; height: 45px; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; background-color: #e9ecef; font-family: monospace; resize: none; }
        .copy-btn { background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 8px 0 15px 0; font-size: 13px; }
    </style>
</head>
<body>
    <h1>🚀 高可用容错净化分发大屏</h1>
    
    <div class="report-box">
        <p style="margin:0;font-size:13px;color:#666;text-align:right;">📅 运行时间：2026-07-16 15:05:54</p>
        <h2>📊 实时防爆数据看板</h2>
        <div class="grid-container">
            <div class="card"><h3>原始节点池</h3><p>0 个</p></div>
            <div class="card"><h3 style="color:#198754;">过筛留存数</h3><p style="color:#198754;">0 个</p></div>
            <div class="card"><h3 style="color:#fd7e14;">稳定接通率</h3><p style="color:#fd7e14;">0%</p></div>
            <div class="card"><h3 style="color:#dc3545;">当前最高网速</h3><p style="color:#dc3545;">0 MB/s</p></div>
        </div>
    </div>

    <div class="report-box">
        <h2>🏆 真实传输性能极速排行榜 Top 15</h2>
        <table>
            <thead>
                <tr><th>名次</th><th>远程节点名称</th><th>物理分布</th><th>直连网速</th><th>TCP 延迟</th></tr>
            </thead>
            <tbody>
                <tr><td colspan='5'>暂无达标高网速直连节点</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="report-box">
        <h2>⚡ 稳定分发链路</h2>
        <strong>明文订阅：</strong>
        <textarea id="sub-url-raw" readonly>https://mid8568.github.io/My-V2Ray-Nodes/nodes.txt?v=1784185554</textarea>
        <button class="copy-btn" onclick="copyUrl('sub-url-raw')">复制高速明文</button>
        <br><strong>Clash 专属配置：</strong>
        <textarea id="sub-url-clash" readonly>https://mid8568.github.io/My-V2Ray-Nodes/clash.yaml?v=1784185554</textarea>
        <button class="copy-btn" style="background-color: #fd7e14;" onclick="copyUrl('sub-url-clash')">复制 Clash 配置</button>
    </div>

    <script>
        function copyUrl(id) {
            var copyText = document.getElementById(id);
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("订阅链已成功复制！");
        }
    </script>
</body>
</html>
