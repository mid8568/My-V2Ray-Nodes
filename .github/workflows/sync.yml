name: V2Ray Ultimate Node Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install sing-box
        run: |
          sudo apt update -qq
          sudo apt install -y jq curl wget unzip
          
          wget -q $(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
          | jq -r '.assets[] | select(.name | contains("linux-amd64.tar.gz")) | .browser_download_url') \
           -O sing.tar.gz

            tar xf sing.tar.gz
            mv sing-box-*/sing-box sing-box
            chmod +x sing-box
            
      - name: sing-box version
        run: |
             ./sing-box version
             
      - name: Install Python
        run: |
             sudo apt install -y python3 curl jq
             
      - name: Download Sources
        run: |
          rm -f raw.txt nodes_all.txt

          curl -fsSL \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            "https://github.com/Epodonios/v2ray-configs/raw/main/All_Configs_Sub.txt" \
            "https://raw.githubusercontent.com/w1770946466/Auto_Proxy/main/Long_term_node_1.txt" \
            -o raw.txt

          python3 <<'PY'
          import base64
          import re

          with open("raw.txt", "r", errors="ignore") as f:
              data = f.read().strip()

          # 自动判断是否为 Base64 订阅
          try:
              decoded = base64.b64decode(data + "===", validate=False).decode("utf-8", errors="ignore")
              if "://" in decoded:
                  data = decoded
                  print("检测到 Base64 订阅，已自动解码")
              else:
                  print("检测到明文订阅")
          except Exception:
              print("检测到明文订阅")

          patterns = [
              r'vmess://[^\s]+',
              r'vless://[^\s]+',
              r'trojan://[^\s]+',
              r'ss://[^\s]+',
              r'hy2://[^\s]+',
              r'hysteria2://[^\s]+',
          ]

          nodes = []
          seen = set()

          for pattern in patterns:
              for node in re.findall(pattern, data):
                  node = node.strip().replace("\r", "")
                  if node and node not in seen:
                      seen.add(node)
                      nodes.append(node)

          with open("nodes_all.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(nodes))

          print(f"提取节点: {len(nodes)}")
          PY
          
      - name: Check Extract Result
        run: |
          echo "原始节点数量:"
          wc -l nodes_all.txt

          echo "协议统计:"
          grep -E "^vmess://" nodes_all.txt | wc -l
          grep -E "^vless://" nodes_all.txt | wc -l
          grep -E "^trojan://" nodes_all.txt | wc -l
          grep -E "^ss://" nodes_all.txt | wc -l
          grep -E "^hy2://" nodes_all.txt | wc -l

          echo "前5节点:"
          head -5 nodes_all.txt
          
      - name: TCP Fast Filter
        timeout-minutes: 15
        run: |
              chmod +x tcp_filter.py
              python3 -u tcp_filter.py

      - name: Check Alive Nodes
        run: |
               echo "alive节点数量:"
               wc -l alive_nodes.txt

                echo "前5个:"
                head -5 alive_nodes.txt
                
      - name: Sing-box Real Test
        timeout-minutes: 45
        run: |
              chmod +x test_nodes.py
              python3 -u test_nodes.py

      - name: Check Result
        run: |
              echo "测速结果:"
              wc -l result.txt

              head -20 result.txt
              
      - name: Debug Result
        run: |

              echo "alive_nodes:"
              wc -l alive_nodes.txt || true

              echo "result:"
              wc -l result.txt || true

              echo "result内容:"
              head -20 result.txt || true
              
      - name: Generate Nodes
        run: |
          if [ ! -s result.txt ]; then
            echo "没有测速成功节点"
            exit 1
          fi

          # 修复：利用管道符号 '|' 进行精准排序并提取纯节点信息
          sort -t '|' -k1,1n result.txt \
          | head -300 \
          | cut -d '|' -f2- \
          > nodes.txt

          base64 -w0 nodes.txt > base64.txt

          echo "生成节点数量:"
          wc -l nodes.txt

      - name: Show Result
        run: |
              echo "测速成功数量:"
              wc -l result.txt

              echo "前10:"
              head -10 result.txt
              
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add \
          nodes.txt \
          base64.txt \
          result.txt
          
          git commit -m "Ultimate node update: $(date '+%Y-%m-%d %H:%M:%S')" || exit 0
          git push
