name: V2Ray Ultimate Node Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          sudo apt update -qq
          sudo apt install -y jq curl wget unzip
          
          wget -q $(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
          | jq -r '.assets[] | select(.name | contains("linux-amd64.tar.gz")) | .browser_download_url') \
           -O sing.tar.gz

            tar xf sing.tar.gz
            mv sing-box-*/sing-box sing-box
            chmod +x sing-box
            
      - name: Install Python
        run: |
             sudo apt install -y python3 curl jq
             
      - name: Download Sources
        run: |
          > raw.txt
          sources=(
            "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/v$(date -u -d '+8 hours' +%Y%m%d)2"
            "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/v$(date -u -d '+8 hours' +%Y%m%d)1"
            "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/main/V2Ray-Config-By-EbraSha-All-Type.txt"
            "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/main/all_extracted_configs.txt"
            "https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/list.txt"
            "https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/Eternity.txt"
            "https://raw.githubusercontent.com/mfuu/v2ray/master/v2"
            "https://raw.githubusercontent.com/barabama/FreeNodes/main/nodes.txt"
          )
          for url in "${sources[@]}"; do
            curl -Ls --max-time 30 "$url" >> raw.txt || true
          done

      - name: Extract
        run: |
          grep -Eo '(vmess|vless|trojan|ss|ssr|hysteria2)://[^" <>\r\n]+' raw.txt | \
          sed 's/\r//' | sort -u > nodes_all.txt
          echo "抓取节点: $(wc -l < nodes_all.txt)"

      - name: Sing-box Real Test
        timeout-minutes: 15
        run: |
              chmod +x test_nodes.py
              python3 -u test_nodes.py

      - name: Generate
        run: |
          if [ ! -s result.txt ]; then
            echo "没有测速成功节点"
            exit 1
          fi

          sort -n result.txt | head -100 | sed 's/^[0-9]*ms //' > nodes.txt

          base64 -w0 nodes.txt > base64.txt

          echo "最终节点数量: $(wc -l < nodes.txt)"

      - name: Generate Config
        run: |
              RAW="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/nodes.txt"

              curl -fL --retry 3 \
              "https://sub.xeton.gq/sub?target=clash&url=$RAW" \
               -o clash.yaml || echo "clash转换失败"

                curl -fL --retry 3 \
               "https://sub.xeton.gq/sub?target=singbox&url=$RAW" \
                -o singbox.json || echo "singbox转换失败"

                 ls -lh clash.yaml singbox.json || true

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add nodes.txt base64.txt clash.yaml singbox.json
          git commit -m "Ultimate node update: $(date '+%Y-%m-%d %H:%M:%S')" || exit 0
          git push
