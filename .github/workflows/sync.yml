name: V2Ray Ultimate Node Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
            
      - name: Install Python
        run: |
          sudo apt update -qq
          sudo apt install -y python3 curl
             
      - name: Download Sources
        run: |
          > raw.txt
          sources=(
            "https://raw.githubusercontent.com/w1770946466/Auto_Proxy/main/Long_term_node_1.txt"
            "https://raw.githubusercontent.com/tuji-source/Tuji/main/v2ray.txt"
            "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"
            "https://raw.githubusercontent.com/mianfeifq/share/main/data.txt"
            "https://raw.githubusercontent.com/AzadNetCH/Clash/master/V2Ray.txt"
            "https://raw.githubusercontent.com/aiboboxx/v2rayfree/main/v2"
            "https://raw.githubusercontent.com/Leon406/SubCrawler/main/sub/share/v2ray.txt"
            "https://raw.githubusercontent.com/youfoundamin/V2Hub/main/nodes.txt"
            "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/main/all_extracted_configs.txt"
          )
          for url in "${sources[@]}"; do
            curl -L --connect-timeout 10 --max-time 60 --retry 3 "$url" >> raw.txt || true
          done
          
      - name: Extract & Deduplicate
        run: |
          python3 <<'PY'
          import re
          
          data = open("raw.txt", errors="ignore").read()
          patterns = [
              r'vmess://[^\s#]+',
              r'vless://[^\s#]+',
              r'trojan://[^\s#]+',
              r'ss://[^\s#]+',
              r'hy2://[^\s#]+',
              r'hysteria2://[^\s#]+'
          ]
          
          nodes = []
          for p in patterns:
              nodes += re.findall(p, data)
              
          # 去重并过滤已知垃圾字符
          clean = list(set([n.replace("\r", "").replace("&amp;", "&") for n in nodes]))
          
          # 控制在 5000 个左右，防止本地客户端加载卡死
          clean = clean[:5000]
          
          open("nodes.txt", "w").write("\n".join(clean))
          import base64
          open("base64.txt", "w").write(base64.b64encode("\n".join(clean).encode()).decode())
          print("有效节点总数:", len(clean))
          PY

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add nodes.txt base64.txt
          git commit -m "Grab nodes: $(date '+%Y-%m-%d %H:%M:%S')" || exit 0
          git push
