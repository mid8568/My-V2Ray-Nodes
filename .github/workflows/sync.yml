name: V2Ray Ultimate Node Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install sing-box
        run: |
          sudo apt update -qq
          sudo apt install -y jq curl wget unzip
          
          wget -q $(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
          | jq -r '.assets[] | select(.name | contains("linux-amd64.tar.gz")) | .browser_download_url') \
           -O sing.tar.gz

            tar xf sing.tar.gz
            mv sing-box-*/sing-box sing-box
            chmod +x sing-box
            
      - name: sing-box version
        run: |
             ./sing-box version
             
      - name: Install Python
        run: |
             sudo apt install -y python3 curl jq
             
      - name: Download Sources
        run: |
          # 定义高质量源列表
          SOURCES=(
            "https://raw.githubusercontent.com/tbbhub/proxy/main/dist/v2ray.txt"
            "https://raw.githubusercontent.com/yebekhe/TelegramList/main/v2ray/ip/vless"
            "https://raw.githubusercontent.com/yebekhe/TelegramList/main/v2ray/ip/vmess"
            "https://raw.githubusercontent.com/yebekhe/TelegramList/main/v2ray/ip/trojan"
            "https://raw.githubusercontent.com/vpei/Free-Node/main/v2ray.txt"
            "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"
          )

          # 清空旧节点文件
          > nodes_all.txt

          # 循环下载并汇总
          for url in "${SOURCES[@]}"; do
            echo "正在抓取: $url"
            # 核心改进：通过 grep 只提取以协议开头的行，自动剔除 404 错误页和乱码
            curl -s -L --connect-timeout 5 --max-time 10 "$url" | grep -E "^(vmess|vless|trojan)://" >> nodes_all.txt || true
          done

          # 最后的去重与清理
          sort -u nodes_all.txt | sed '/^$/d' > nodes_tmp.txt
          mv nodes_tmp.txt nodes_all.txt

          echo "抓取完成，清洗后共计节点: $(wc -l < nodes_all.txt)"

          
      - name: TCP Fast Filter
        timeout-minutes: 15
        run: |
              chmod +x tcp_filter.py
              python3 -u tcp_filter.py

      - name: Check Alive Nodes
        run: |
               echo "alive节点数量:"
               wc -l alive_nodes.txt

                echo "前5个:"
                head -5 alive_nodes.txt

      - name: Verify Core
        run: |
          ./sing-box version || echo "Sing-box 核心无法运行！"
          ls -l sing-box
          
      - name: Sing-box Real Test
        timeout-minutes: 45
        run: |
              chmod +x test_nodes.py
              python3 -u test_nodes.py

      - name: Check Result
        run: |
              echo "测速结果:"
              wc -l result.txt

              head -20 result.txt
              
      - name: Debug Result
        run: |

              echo "alive_nodes:"
              wc -l alive_nodes.txt || true

              echo "result:"
              wc -l result.txt || true

              echo "result内容:"
              head -20 result.txt || true
              
      - name: Generate Nodes
        run: |
          # 检查 result.txt 是否存在且有内容
          if [ ! -s result.txt ]; then
            echo "错误：result.txt 为空，没有节点通过测速。"
            exit 0 # 不中断，防止 workflow 变红
          fi

          echo "当前 result.txt 行数:"
          wc -l result.txt

          # 排序并提取：-t '|' 指定分隔符，-k1,1n 按第一列数字排序
          # 确保这一步正确执行
          sort -t '|' -k1,1n result.txt | head -n 150 | cut -d '|' -f2- > nodes.txt
          
          echo "生成后的节点数量:"
          wc -l nodes.txt
          
          # 生成 base64
          base64 -w0 nodes.txt > base64.txt

      - name: Show Result
        run: |
              echo "测速成功数量:"
              wc -l result.txt

              echo "前10:"
              head -10 result.txt
              
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add \
          nodes.txt \
          base64.txt \
          result.txt
          
          git commit -m "Ultimate node update: $(date '+%Y-%m-%d %H:%M:%S')" || exit 0
          git push
