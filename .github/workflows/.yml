name: Repo Auto Mirror Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  mirror-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force Sync From Target Repo
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 1. 强行拉取并注入对方仓库的最新全部历史数据
          git remote add target https://github.com
          git fetch target main
          
          # 2. 强行将本地 main 分支重置并对齐为对方 main 分支的模样，无视任何冲突
          git checkout main
          git reset --hard target/main
          
          # 3. 使用本地高权限令牌强行推送回你自己的首页
          git push --force origin main
