name: Repo Auto Mirror Sync

on:
  workflow_dispatch: # 支持网页端手动点击按钮触发

jobs:
  mirror-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout My Repo
        uses: actions/checkout@v4
        with:
          # 必须拉取完整的历史记录，否则无法进行强制合并
          fetch-depth: 0

      - name: Force Pull From Target Repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 1. 强行把 free-nodes 的大库节点拉取到本地，并允许毫无关联的历史记录进行合并
          # --allow-unrelated-histories 是为了防止两个库结构不同而报错
          # -X theirs 代表如果遇到任何节点文件冲突，一律以对方的最新文件为准
          git pull https://github.com main --allow-unrelated-histories -X theirs --no-edit

      - name: Commit and Push
        run: |
          # 2. 将拉取到的全套最新日期节点文件强行推送到你的仓库首页
          git push origin main
