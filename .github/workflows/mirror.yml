name: Remote Repo Node Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,6,12,18 * * *'

concurrency:
  group: remote-nodes-scan
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan-and-filter:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 2. 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev jq

      - name: 4. 多源抓取 + 延迟质量评分
        run: |
          set -euo pipefail
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY all_proxy ALL_PROXY

          touch .gitignore
          for item in "temp_*" "decoded_*" "*.bak" "speed_test.py" "subconverter*"; do
            grep -qxF "$item" .gitignore || echo "$item" >> .gitignore
          done

          TODAY=$(date -u -d '+8 hours' +%Y%m%d)

          # 写入 Python 测速脚本
          cat > speed_test.py << 'PYEOF'
import sys
import asyncio
import socket
import time
import re

SEMAPHORE_LIMIT = 100
TIMEOUT = 4.0

DNS_CACHE = {}
PORT_BLACKLIST = {21, 22, 23, 25, 53, 110, 143, 3306, 3389}

def parse_node(line):
    line = line.strip()
    if not line:
        return None
    try:
        match = re.match(r'^([a-zA-Z0-9\-_]+)://([^@]+@)?(?P<host>[a-zA-Z0-9\.\-_\[\]:]+):(?P<port>\d+)', line)
        if not match:
            return None
        host = match.group('host')
        port = int(match.group('port'))
        if port in PORT_BLACKLIST or '[' in host or ']' in host:
            return None
        name = "未知节点"
        if '#' in line:
            name = line.split('#')[-1].strip()
        elif 'remarks=' in line:
            m = re.search(r'remarks=([^&]+)', line)
            if m:
                name = m.group(1)
        return {"raw": line, "host": host, "port": port, "name": name}
    except:
        return None

async def cached_getaddrinfo(host, port, loop):
    if host in DNS_CACHE:
        return DNS_CACHE[host]
    try:
        infos = await asyncio.wait_for(
            loop.getaddrinfo(host, port, family=socket.AF_UNSPEC, type=socket.SOCK_STREAM),
            timeout=2.0
        )
        if infos:
            ip = infos[0][4][0]
            DNS_CACHE[host] = ip
            return ip
    except:
        pass
    return None

async def test_node(node, sem, loop):
    async with sem:
        ip = await cached_getaddrinfo(node['host'], node['port'], loop)
        if not ip:
            return None
        start = time.perf_counter()
        try:
            r, w = await asyncio.wait_for(asyncio.open_connection(ip, node['port']), timeout=TIMEOUT)
            delay = (time.perf_counter() - start) * 1000
            w.close()
            await w.wait_closed()
        except:
            return None
        total_delay = int(delay)
        score = round(max(10, min(98, 6000.0 / (total_delay + 20.0))), 1)
        region = "其他"
        for k, v in [("HK","香港"),("TW","台湾"),("SG","新加坡"),("JP","日本"),("US","美国"),("KR","韩国"),("CN","中国")]:
            if k in node['name'].upper() or k in node['host'].upper():
                region = v
                break
        return {"raw": node['raw'], "name": node['name'], "delay": total_delay, "score": score, "region": region}

async def main():
    loop = asyncio.get_running_loop()
    lines = sys.stdin.readlines()
    nodes = [p for line in lines if (p := parse_node(line))]
    sem = asyncio.Semaphore(SEMAPHORE_LIMIT)
    results = await asyncio.gather(*[test_node(n, sem, loop) for n in nodes])
    alive = [r for r in results if r and r['delay'] <= 800]
    alive.sort(key=lambda x: x['delay'])
    alive = alive[:800]
    for n in alive:
        print(n['raw'])

if __name__ == '__main__':
    asyncio.run(main())
PYEOF

          # ==================== 抓取多源节点 ====================
          urls=(
            "https://cdn.jsdelivr.net/gh/free-nodes/v2rayfree@main/v${TODAY}2"
            "https://cdn.jsdelivr.net/gh/free-nodes/v2rayfree@main/v${TODAY}1"
            "https://raw.githubusercontent.com/aiboboxme/v2rayfree/main/v2ray"
            "https://raw.githubusercontent.com/v2ray-links/v2ray-free-nodes/main/nodes"
            "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"
            "https://raw.githubusercontent.com/mianfeifq/share/main/data.txt"
            "https://raw.githubusercontent.com/freefq/free/master/v2"
          )

          rm -f temp_all_raw.txt && touch temp_all_raw.txt
          for url in "${urls[@]}"; do
            echo "正在抓取: $url"
            rm -f temp_src.txt decoded_src.txt
            code=$(curl -A "Mozilla/5.0" -sL --connect-timeout 10 --max-time 20 -o temp_src.txt -w "%{http_code}" "$url" || true)
            if [ "$code" = "200" ] && [ "$(wc -c < temp_src.txt || echo 0)" -gt 200 ]; then
              sed -i '1s/^\xEF\xBB\xBF//' temp_src.txt
              if grep -qi "<html" temp_src.txt; then continue; fi
              if ! grep -E -q "^[[:space:]]*(vmess|vless|ss|ssr|trojan|hy2|hysteria2|socks|tuic|wireguard)://" temp_src.txt; then
                if tr -d '\r\n\t ' < temp_src.txt | base64 -d > decoded_src.txt 2>/dev/null; then
                  mv decoded_src.txt temp_src.txt
                else
                  continue
                fi
              fi
              cat temp_src.txt >> temp_all_raw.txt
            fi
          done

          if [ -s temp_all_raw.txt ]; then
            awk '!seen[$0]++' temp_all_raw.txt > temp_clean.txt
            python3 speed_test.py < temp_clean.txt > temp_final.txt || touch temp_final.txt
            grep -v "\-1" temp_final.txt > temp_pure.txt || touch temp_pure.txt
            
            if [ -s temp_pure.txt ] && [ "$(grep -c "[a-zA-Z0-
