name: Repo Auto Mirror Sync - V5.3 Fortress Pro

on:
  workflow_dispatch:
  schedule:
    # 北京时间每天的 08:00, 12:00, 16:00, 20:00, 00:00, 04:00 运行
    - cron: '0 */4 * * *'

concurrency:
  group: nodes-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  smart-sync:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: 1. 检出本地仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 2. 探测上游可用性
        run: |
          set -euo pipefail
          TODAY=$(date -u -d '+8 hours' +%Y%m%d)
          TEST_URL="https://raw.githubusercontent.com/free-nodes/v2rayfree/main/v${TODAY}2"
          echo "=== 正在探测今日上游 Raw 路径可用性 ==="
          curl -I -s -A "Mozilla/5.0" -o /dev/null -w "HTTP 状态码: %{http_code}\n" "$TEST_URL" || true

      - name: 3. 安全提取、高并发双源灾备、TCP 测速与置顶排序
        run: |
          set -euo pipefail
         
          touch .gitignore
          for item in "temp_*" "decoded_*" "*.bak" "tcp_alive_nodes.txt" "clean_nodes.txt" "verified_temp.txt"; do
            grep -qxF "$item" .gitignore || echo "$item" >> .gitignore
          done
         
          if [ -f nodes.txt ]; then
            cp nodes.txt /tmp/nodes_backup.txt
            echo "【事务安全】已备份当前节点"
          fi
         
          TODAY=$(date -u -d '+8 hours' +%Y%m%d)
          YESTERDAY=$(date -u -d '+8 hours -1 day' +%Y%m%d)
         
          urls=()

          BASE_URLS=(
             "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/v"
             "https://cdn.jsdelivr.net/gh/free-nodes/v2rayfree@main/v"
          )

          echo "=== 自动检测可用订阅源 ==="

          for DATE in "$TODAY" "$YESTERDAY"
          do

              for NUM in 2 1
              do

                  for BASE in "${BASE_URLS[@]}"
                  do

                      URL="${BASE}${DATE}${NUM}"

                      echo "检测: $URL"

                      STATUS=$(curl \
                          -L \
                          -s \
                          -o /dev/null \
                          -w "%{http_code}" \
                          -A "Mozilla/5.0" \
                          --connect-timeout 5 \
                          --max-time 10 \
                          "$URL" || true)

                      if [ "$STATUS" = "200" ]; then

                          echo "✓ 可用: $URL"

                          urls+=("$URL")

                      else

                          echo "× 跳过: $URL ($STATUS)"

                      fi

                  done

              done

          done
             
              sed -i '/^[[:space:]]*#/d;/example-node/Id;/expired/Id;/^$/d' temp_nodes.txt
              awk '!seen[$0]++' temp_nodes.txt > clean_nodes.txt && mv clean_nodes.txt temp_nodes.txt
             
           echo "=== 开始节点检测 ==="

           > verified_temp.txt
           > speed_nodes.txt

               while IFS= read -r line || [ -n "$line" ]; do

               [ -z "$line" ] && continue

               clean_uri=$(echo "$line" | cut -d'#' -f1)

             # 提取 host:port
              host_port=$(echo "$clean_uri" \
              | grep -oE '(@|\])[a-zA-Z0-9.-]+:[0-9]+' \
              | tr -d '@]' \
              | tail -n1 || true)


             [ -z "$host_port" ] && continue


            host="${host_port%:*}"
            port="${host_port##*:}"
  
            # TCP测试 + 计算延迟
           start=$(date +%s%3N)

          if timeout 3 bash -c "</dev/tcp/$host/$port" 2>/dev/null
          then

          end=$(date +%s%3N)

          delay=$((end-start))


          # 只保留300ms以内节点
          if [ "$delay" -le 300 ]
          then
          echo "${delay}|${line}" >> speed_nodes.txt
          fi

           fi

           done < temp_nodes.txt


          echo "=== 延迟排序 ==="

            # 延迟从低到高排序

           sort -n speed_nodes.txt \
           | cut -d'|' -f2 \
           | awk '!seen[$0]++' \
           > verified_temp.txt



          mv verified_temp.txt tcp_alive_nodes.txt



           COUNT=$(wc -l < tcp_alive_nodes.txt)

          echo "高速节点数量: $COUNT"
             
              NODE_COUNT=$(wc -l < tcp_alive_nodes.txt)

             if [ "$NODE_COUNT" -ge 5 ]; then
                success=true
                break
              fi
            fi
          done
         
          if [ "$success" = true ]; then
            cat tcp_alive_nodes.txt \
             | grep -E "${PROTOCOL_REGEX}" \
             | awk '!seen[$0]++' \
             | head -n 300 > nodes.txt
            echo "【成功】鲜活节点已置顶"
          else
            echo "【熔断】所有源失效，回滚备份"
            if [ -f /tmp/nodes_backup.txt ]; then
              cp /tmp/nodes_backup.txt nodes.txt
            fi
          fi
          rm -f temp_* tcp_alive_nodes.txt

      - name: 4. 检测文件变更
        id: check_changes
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch nodes.txt base64.txt clash.yaml singbox.json >/dev/null 2>&1 \
             && git diff --quiet HEAD -- nodes.txt base64.txt clash.yaml singbox.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 5. 生成 Base64 编码
        if: ${{ steps.check_changes.outputs.changed == 'true' }}
        run: |
          base64 -w 0 nodes.txt > base64.txt

      - name: 6. 生成 Clash & sing-box 配置
        if: ${{ steps.check_changes.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          CURRENT_BRANCH=$(git branch --show-current)
          RAW_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${CURRENT_BRANCH}/nodes.txt"
          CACHE_ID=$(date +%s)
         
          # Clash
          curl -sL -A "clash" "https://sub.xeton.gq/sub?target=clash&url=${RAW_URL}&insert=false&emoji=true&udp=true" -o clash.yaml || echo "proxies: []" > clash.yaml
         
          # sing-box
          curl -sL -A "sing-box" "https://sub.xeton.gq/sub?target=singbox&url=${RAW_URL}&insert=false&emoji=true" -o singbox.json || echo '{"outbounds":[]}' > singbox.json

      - name: 7. 提交更新
        if: ${{ steps.check_changes.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
         
          git add nodes.txt base64.txt clash.yaml singbox.json .gitignore
         
          if git diff --cached --quiet; then
            echo "无实质变更"
            exit 0
          fi
         
          BEIJING_TIME=$(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S')
          git commit -m "Auto Sync at $BEIJING_TIME"
         
          CURRENT_BRANCH=$(git branch --show-current)
          git pull --rebase origin "$CURRENT_BRANCH"
          git push origin "$CURRENT_BRANCH"
