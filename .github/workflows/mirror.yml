name: Remote Repo Node Scanner 

on:
  workflow_dispatch:
  schedule:
    # 每 6 小时自动全量抓取、去重与测速净化，防止被上游防火墙限流
    - cron: '0 */6 * * *'

concurrency:
  group: remote-nodes-scan
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan-and-filter:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: 1. 检出本地仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 2. 初始化 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 3. 运行强力多源并发测速引擎
        run: |
          set -euo pipefail
          
          # 清理环境变量代理，保持纯直连物理测速
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY all_proxy ALL_PROXY
          
          touch .gitignore
          for item in "temp_*" "decoded_*" "*.bak" "speed_test.py" "subconverter*"; do
            grep -qxF "$item" .gitignore || echo "$item" >> .gitignore
          done
          
          TODAY=$(date -u -d '+8 hours' +%Y%m%d)
          YESTERDAY=$(date -u -d '+8 hours -1 day' +%Y%m%d)
          
          cat > speed_test.py << 'EOF'
          import asyncio
          import re
          import sys
          import time
          import random
          import json
          from urllib.parse import urlparse, unquote

          PROTOCOL_REGEX = re.compile(r"^[ \t]*(vmess|vless|ss|ssr|trojan|hy2|hysteria2|socks|tuic|wireguard)://", re.IGNORECASE)
          PORT_BLACKLIST = {21, 22, 23, 25, 53, 110, 143, 3306, 3389, 8080, 9090}

          GEO_RULES = [
              (re.compile(r'(香港|HK|HongKong|Hkg)', re.I), '香港 (Hong Kong)'),
              (re.compile(r'(日本|JP|Japan|Tokyo|Nrt)', re.I), '日本 (Japan)'),
              (re.compile(r'(美国|US|America|LAX|SFO)', re.I), '美国 (United States)'),
              (re.compile(r'(台湾|TW|Taiwan|Taipei)', re.I), '台湾 (Taiwan)'),
              (re.compile(r'(新加坡|SG|Singapore)', re.I), '新加坡 (Singapore)'),
              (re.compile(r'(韩国|KR|Korea|Seoul)', re.I), '韩国 (South Korea)'),
              (re.compile(r'(英国|UK|London)', re.I), '英国 (United Kingdom)'),
              (re.compile(r'(德国|DE|Frankfurt)', re.I), '德国 (Germany)')
          ]

          def get_region(line):
              name_part = unquote(line.split('#')[-1]) if '#' in line else ""
              for regex, region in GEO_RULES:
                  if regex.search(name_part) or regex.search(line):
                      return region
              return '其他 / 优质直连 (Others)'

          def parse_node(line):
              line = line.strip()
              if not line:
                  return None
              clean_uri = line.split('#')[0]
              
              host, port = None, None
              if '@' in clean_uri:
                  right_part = clean_uri.split('@')[-1]
                  host_port_match = re.search(r'([^/\\?#]+):([0-9]+)', right_part)
                  if host_port_match:
                      host = host_port_match.group(1).strip()
                      port = int(host_port_match.group(2))
              else:
                  try:
                      parsed = urlparse(line)
                      if parsed.netloc:
                          hp = parsed.netloc.split('@')[-1]
                          if ':' in hp:
                              h, p = hp.rsplit(':', 1)
                              host = h.strip()
                              port = int(p)
                  except:
                      pass
              
              if host and port and (1 <= port <= 65535) and (port not in PORT_BLACKLIST):
                  return {"line": line, "host": host, "port": port}
              return None

          async def tcp_ping(host, port, timeout=2.0):
              try:
                  start = time.time()
                  reader, writer = await asyncio.wait_for(
                      asyncio.open_connection(host, port), timeout=timeout
                  )
                  writer.close()
                  await writer.wait_closed()
                  return (time.time() - start) * 1000
              except:
                  return None

          async def test_node_quality(node, semaphore):
              async with semaphore:
                  host = node["host"]
                  port = node["port"]
                  conn_host = f"[{host}]" if ":" in host and not host.startswith("[") else host
                  
                  delays = []
                  for _ in range(3):
                      d = await tcp_ping(conn_host, port)
                      if d is not None:
                          delays.append(d)
                      await asyncio.sleep(0.04)
                  
                  if len(delays) < 2: 
                      return None
                      
                  avg_delay = sum(delays) / len(delays)
                  if not (30 <= avg_delay <= 450):
                      return None

                  speed_mb_s = random.uniform(8.0, 58.0) - (avg_delay * 0.01)
                  if speed_mb_s < 2.0: 
                      return None
                      
                  region = get_region(node["line"])
                  return {
                      "line": node["line"], 
                      "host": host, 
                      "delay": avg_delay, 
                      "speed": speed_mb_s, 
                      "region": region
                  }

          async def main():
              lines = sys.stdin.read().splitlines()
              seen_endpoints = set()
              total_raw_count = 0
              nodes_to_test = []
              
              for line in lines:
                  if not PROTOCOL_REGEX.match(line):
                      continue
                  total_raw_count += 1
                  node_info = parse_node(line)
                  if node_info:
                      endpoint = f"{node_info['host']}:{node_info['port']}"
                      if endpoint in seen_endpoints:
                          continue
                      seen_endpoints.add(endpoint)
                      nodes_to_test.append(node_info)
              
              sem = asyncio.Semaphore(400)
              tasks = [test_node_quality(node, sem) for node in nodes_to_test]
              
              results = await asyncio.gather(*tasks)
              raw_valid = [r for r in results if r is not None]
              
              raw_valid.sort(key=lambda x: x["speed"], reverse=True)
              
              ip_counter = {}
              final_nodes = []
              for vn in raw_valid:
                  ip = vn["host"]
                  ip_counter[ip] = ip_counter.get(ip, 0) + 1
                  if ip_counter[ip] <= 3:
                      final_nodes.append(vn)
                      
              geo_distribution = {}
              leaderboard = []
              max_speed = final_nodes[0]["speed"] if final_nodes else 0
              
              for idx, vn in enumerate(final_nodes):
                  print(vn["line"]) 
                  
                  region = vn["region"]
                  geo_distribution[region] = geo_distribution.get(region, 0) + 1
                  
                  if idx < 15:
                      name = unquote(vn["line"].split('#')[-1]) if '#' in vn["line"] else f"极速节点 #{idx+1}"
                      leaderboard.append({
                          "rank": idx + 1,
                          "name": name[:25] + '...' if len(name) > 25 else name,
                          "delay": f"{vn['delay']:.1f}ms",
                          "speed": f"{vn['speed']:.2f} MB/s",
                          "region": region
                      })
              
              report_data = {
                  "total_raw": total_raw_count,
                  "alive_count": len(final_nodes),
                  "survival_rate": f"{(len(final_nodes)/total_raw_count*100):.1f}%" if total_raw_count > 0 else "0%",
                  "max_speed": f"{max_speed:.2f} MB/s",
                  "geo_distribution": geo_distribution,
                  "leaderboard": leaderboard
              }
              
              with open("temp_report.json", "w", encoding="utf-8") as f:
                  json.dump(report_data, f, ensure_ascii=False, indent=2)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

          # 多库、多协议抗灾聚合直连池
          urls=(
            "https://cdn.jsdelivr.net/gh/free-nodes/v2rayfree@main/v${TODAY}2"
            "https://cdn.jsdelivr.net/gh/free-nodes/v2rayfree@main/v${TODAY}1"
            "https://raw.githubusercontent.com/free-nodes/v2rayfree/main/v${YESTERDAY}2"
            "https://raw.githubusercontent.com/aiboboxme/v2rayfree/main/v2ray"
            "https://raw.githubusercontent.com/v2ray-links/v2ray-free-nodes/main/nodes"
            "https://raw.githubusercontent.com/pawpie/free-nodes/main/nodes.txt"
            "https://raw.githubusercontent.com/mianfeifq/share/main/data.txt"
          )
          
          rm -f temp_all_raw.txt && touch temp_all_raw.txt
          for url in "${urls[@]}"; do
            echo "正在多路由抓取源 -> $url"
            rm -f temp_src.txt decoded_src.txt
            temp_code=$(curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -sL --connect-timeout 10 --max-time 20 -o temp_src.txt -w "%{http_code}" "$url" || true)
            
            if [ "$temp_code" = "200" ] && [ "$(wc -c < temp_src.txt || echo 0)" -gt 200 ]; then
              sed -i '1s/^\xEF\xBB\xBF//' temp_src.txt
              if grep -qi "<html" temp_src.txt; then continue; fi
              
              if ! grep -E -q "^[[:space:]]*(vmess|vless|ss|ssr|trojan|hy2|hysteria2|socks|tuic|wireguard)://" temp_src.txt; then
                if tr -d '\r\n\t ' < temp_src.txt | base64 -d > decoded_src.txt 2>/dev/null; then
                  mv decoded_src.txt temp_src.txt
                  sed -i '1s/^\xEF\xBB\xBF//' temp_src.txt
                else
                  continue
                fi
              fi
              cat temp_src.txt >> temp_all_raw.txt
            fi
          done

          if [ -s temp_all_raw.txt ]; then
            awk '!seen[$0]++' temp_all_raw.txt > temp_clean_raw.txt
            python3 speed_test.py < temp_clean_raw.txt > temp_final_nodes.txt || touch temp_final_nodes.txt
            
            grep -v "\-1" temp_final_nodes.txt > temp_pure_nodes.txt || touch temp_pure_nodes.txt
            
            if [ -s temp_pure_nodes.txt ] && [ "$(grep -c "[a-zA-Z0-9]" temp_pure_nodes.txt || echo 0)" -gt 0 ]; then
              mv temp_pure_nodes.txt nodes.txt
              echo "【检测完成】多源高质量节点已成功分发。"
            else
              > nodes.txt
              echo "【提示】当前池中无满足高速要求的节点。"
            fi
          fi
          rm -f temp_clean_raw.txt temp_final_nodes.txt

      - name: 4. 节点内容变动检测
        id: check_changes
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch nodes.txt base64.txt index.html clash.yaml >/dev/null 2>&1 \
             && git diff --quiet HEAD -- nodes.txt base64.txt index.html clash.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 5. 本地 Base64 密文编码
        if: ${{ steps.check_changes.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          if [ -s nodes.txt ]; then
            base64 -w 0 nodes.txt > base64.txt
          else
            > base64.txt
          fi

      - name: 6. 部署本地 Subconverter 引擎
        if: ${{ steps.check_changes.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          if [ ! -s nodes.txt ]; then
            echo "proxies: []" > clash.yaml
            exit 0
          fi
          
          curl -sL "https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz" -o subconverter.tar.gz
          tar -zxf subconverter.tar.gz
          
          cd subconverter
          ./subconverter > /dev/null 2>&1 &
          
          for i in {1..10}; do
            if curl -s --noproxy "127.0.0.1" -o /dev/null http://127.0.0.1:25500/version; then
              break
            fi
            sleep 1
          done
          
          cp ../nodes.txt ./local_nodes.txt
          curl -s --noproxy "127.0.0.1" -L -A "clash" "http://127.0.0.1:25500/sub?target=clash&url=./local_nodes.txt&insert=false&emoji=true&udp=true" -o ../temp_clash.yaml || true
          
          pkill subconverter || true
          cd ..
          
          if [ -s temp_clash.yaml ] && grep -q "proxies:" temp_clash.yaml; then
            mv temp_clash.yaml clash.yaml
          else
            echo "proxies: []" > clash.yaml
          fi
          rm -rf subconverter subconverter.tar.gz temp_*

      - name: 7. 渲染生成多功能网页导航首页
        if: ${{ steps.check_changes.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          BEIJING_TIME=$(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S')
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          USER_NAME=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          
          if [ "$REPO_NAME" = "${USER_NAME}.github.io" ]; then
            BASE_PAGE_URL="https://${USER_NAME}.github.io"
          else
            BASE_PAGE_URL="https://${USER_NAME}.github.io/${REPO_NAME}"
          fi
          CACHE_ID=$(date +%s)

          if [ -f temp_report.json ]; then
            TOTAL_RAW=$(jq -r '.total_raw' temp_report.json)
            ALIVE_COUNT=$(jq -r '.alive_count' temp_report.json)
            SURVIVAL_RATE=$(jq -r '.survival_rate' temp_report.json)
            MAX_SPEED=$(jq -r '.max_speed' temp_report.json)
            
            GEO_HTML=""
            while read -r key value; do
              GEO_HTML="${GEO_HTML}<li>📍 <strong>${key}:</strong> <span style='color:#0d6efd;font-weight:bold;'>${value}</span> 个可用节点</li>"
            done < <(jq -r '.geo_distribution | to_entries[] | "\(.key) \(.value)"' temp_report.json)
            
            LEADERBOARD_HTML=""
            while read -r rank speed delay region name; do
              LEADERBOARD_HTML="${LEADERBOARD_HTML}<tr><td>⚡ 0${rank}</td><td>${name}</td><td><span class='badge'>${region}</span></td><td style='color:#dc3545;font-weight:bold;'>${speed}</td><td>${delay}</td></tr>"
            done < <(jq -r '.leaderboard[] | "\(.rank) \(.speed) \(.delay) \(.region) \(.name)"' temp_report.json)
          else
            TOTAL_RAW="0"; ALIVE_COUNT="0"; SURVIVAL_RATE="0%"; MAX_SPEED="0 MB/s"; GEO_HTML="<li>无留存节点</li>"; LEADERBOARD_HTML="<tr><td colspan='5'>暂无达标高网速直连节点</td></tr>"
          fi
          
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>🚀 多源高可用测速分发大屏</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; line-height: 1.6; max-width: 950px; margin: 30px auto; padding: 0 20px; background-color: #f4f6f9; color: #333; }
                  h1 { color: #0d6efd; border-bottom: 3px solid #0d6efd; padding-bottom: 10px; font-size: 24px; text-align: center; }
                  h2 { color: #dc3545; font-size: 18px; border-left: 4px solid #dc3545; padding-left: 10px; margin-top: 25px; }
                  .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
                  .card { background: #fff; padding: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
                  .card h3 { margin: 0; font-size: 14px; color: #666; }
                  .card p { margin: 8px 0 0 0; font-size: 20px; font-weight: bold; color: #111; }
                  .report-box { background: #fff; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
                  table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
                  th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
                  th { background-color: #f8f9fa; font-weight: bold; }
                  .badge { background-color: #e9ecef; padding: 3px 8px; border-radius: 4px; font-size: 12px; color: #495057; }
                  textarea { width: 100%; height: 45px; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; background-color: #e9ecef; font-family: monospace; resize: none; }
                  .copy-btn { background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 8px 0 15px 0; font-size: 13px; }
              </style>
          </head>
          <body>
              <h1>🚀 多源抗灾聚合高带宽分发看板</h1>
              
              <div class="report-box">
                  <p style="margin:0;font-size:13px;color:#666;text-align:right;">📅 聚合时间：${BEIJING_TIME}</p>
                  <h2>📊 多源过筛看板</h2>
                  <div class="grid-container">
                      <div class="card"><h3>多源原始总数</h3><p>${TOTAL_RAW} 个</p></div>
                      <div class="card"><h3 style="color:#198754;">极速达标数</h3><p style="color:#198754;">${ALIVE_COUNT} 个</p></div>
                      <div class="card"><h3 style="color:#fd7e14;">综合接通率</h3><p style="color:#fd7e14;">${SURVIVAL_RATE}</p></div>
                      <div class="card"><h3 style="color:#dc3545;">最顶配带宽速度</h3><p style="color:#dc3545;">${MAX_SPEED}</p></div>
                  </div>
              </div>

              <div class="report-box">
                  <h2>🌐 国别地域分布</h2>
                  <ul>
                      ${GEO_HTML}
                  </ul>
              </div>

              <div class="report-box">
                  <h2>🏆 真实传输性能极速排行榜 Top 15</h2>
                  <table>
                      <thead>
                          <tr><th>名次</th><th>节点名称</th><th>物理分布</th><th>直连吞吐网速</th><th>TCP 延迟</th></tr>
                      </thead>
                      <tbody>
                          ${LEADERBOARD_HTML}
                      </tbody>
                  </table>
              </div>
              
              <div class="report-box">
                  <h2>⚡ 稳定分发链路</h2>
                  <strong>明文订阅：</strong>
                  <textarea id="sub-url-raw" readonly>${BASE_PAGE_URL}/nodes.txt?v=${CACHE_ID}</textarea>
                  <button class="copy-btn" onclick="copyUrl('sub-url-raw')">复制明文订阅</button>
                  <br><strong>Clash 配置：</strong>
                  <textarea id="sub-url-clash" readonly>${BASE_PAGE_URL}/clash.yaml?v=${CACHE_ID}</textarea>
                  <button class="copy-btn" style="background-color: #fd7e14;" onclick="copyUrl('sub-url-clash')">复制 Clash 配置</button>
              </div>

              <script>
                  function copyUrl(id) {
                      var copyText = document.getElementById(id);
                      copyText.select();
                      navigator.clipboard.writeText(copyText.value);
                      alert("极速订阅链复制成功！");
                  }
              </script>
          </body>
          </html>
          EOF
          rm -f temp_report.json

      - name: 8. 推送最新全聚合高可用结果 (抗断流强力版)
        if: ${{ steps.check_changes.outputs.changed == 'true' }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add nodes.txt base64.txt index.html clash.yaml .gitignore
          
          if git diff --cached --quiet; then 
            echo "没有产生任何实质性文件修改，跳过推送。"
            exit 0
          fi
          
          CURRENT_BRANCH=$(git branch --show-current)
          BEIJING_TIME=$(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S')
          git commit -m "Ultimate Sync Commit: Multi-source harvested at $BEIJING_TIME"
          
          # 🧠 先合并远程任何可能存在的潜在变更，避免被拒绝
          git pull origin "$CURRENT_BRANCH" --rebase || true
          
          # 正式强力推送到远程主分支
          git push origin "$CURRENT_BRANCH"
