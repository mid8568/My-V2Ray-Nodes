name: Repo Auto Mirror Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  mirror-sync:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout My Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0


      - name: Download Source Repo
        run: |
          rm -rf source

          git clone --depth=1 \
          https://github.com/free-nodes/v2rayfree.git \
          source


      - name: Replace Files
        run: |
          rm -rf ./*

          cp -r source/* .

          rm -rf source


      - name: Generate index.html
        run: |
          cat > index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <title>Node List</title>
          </head>

          <body>

          <h1>Repository Updated</h1>

          <p>
          Last update:
          $(date)
          </p>

          <a href="nodes.txt">
          Open nodes.txt
          </a>

          </body>
          </html>
          EOF


      - name: Commit And Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto mirror update $(date +'%F %T')"

          git push origin main
