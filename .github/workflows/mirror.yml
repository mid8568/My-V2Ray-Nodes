name: Remote Repo Node Scanner 

on:
  workflow_dispatch:
  schedule:
    # 每 6 小时查杀一次，防止被上游防火墙拉黑 IP
    - cron: '0 */12 * * *'

concurrency:
  group: remote-nodes-scan
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan-and-filter:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: 1. 检出本地仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 2. 初始化 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 3. 运行强力多源并发测速引擎
        run: |
          set -euo pipefail
          
          # 清理环境变量代理，保持纯直连测速
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY all_proxy ALL_PROXY
          
          touch .gitignore
          for item in "temp_*" "decoded_*" "*.bak" "speed_test.py" "subconverter*"; do
            grep -qxF "$item" .gitignore \vert{}\vert{} echo "$item" >> .gitignore
          done
          
          TODAY=$(date -u -d '+8 hours' +%Y%m%d)
          YESTERDAY=$(date -u -d '+8 hours -1 day' +%Y%m%d)
          
          cat > speed_test.py << 'EOF'
          import asyncio
          import re
          import sys
          import time
          import random
          import json
          from urllib.parse import urlparse, unquote

          PROTOCOL_REGEX = re.compile(r"^[ \t]*(vmess|vless|ss|ssr|trojan|hy2|hysteria2|socks|tuic|wireguard)://", re.IGNORECASE)
          PORT_BLACKLIST = {21, 22, 23, 25, 53, 110, 143, 3306, 3389, 8080, 9090}

          GEO_RULES = [
              (re.compile(r'(香港|HK|HongKong|Hkg)', re.I), '香港 (Hong Kong)'),
              (re.compile(r'(日本|JP|Japan|Tokyo|Nrt)', re.I), '日本 (Japan)'),
              (re.compile(r'(美国|US|America|LAX|SFO)', re.I), '美国 (United States)'),
              (re.compile(r'(台湾|TW|Taiwan|Taipei)', re.I), '台湾 (Taiwan)'),
              (re.compile(r'(新加坡|SG|Singapore)', re.I), '新加坡 (Singapore)'),
              (re.compile(r'(韩国|KR|Korea|Seoul)', re.I), '韩国 (South Korea)'),
              (re.compile(r'(英国|UK|London)', re.I), '英国 (United Kingdom)'),
              (re.compile(r'(德国|DE|Frankfurt)', re.I), '德国 (Germany)')
          ]

          def get_region(line):
              name_part = unquote(line.split('#')[-1]) if '#' in line else ""
              for regex, region in GEO_RULES:
                  if regex.search(name_part) or regex.search(line):
                      return region
              return '其他 / 优质直连 (Others)'

          def parse_node(line):
              line = line.strip()
              if not line:
                  return None
              clean_uri = line.split('#')[0]
              
              host, port = None, None
              if '@' in clean_uri:
                  right_part = clean_uri.split('@')[-1]
                  host_port_match = re.search(r'([^/\\?#]+):([0-9]+)', right_part)
                  if host_port_match:
                      host = host_port_match.group(1).strip()
                      port = int(host_port_match.group(2))
              else:
                  try:
                      parsed = urlparse(line)
                      if parsed.netloc:
                          hp = parsed.netloc.split('@')[-1]
                          if ':' in hp:
                              h, p = hp.rsplit(':', 1)
                              host = h.strip()
                              port = int(p)
                  except:
                      pass
              
              if host and port and (1 <= port <= 65535) and (port not in PORT_BLACKLIST):
                  return {"line": line, "host": host, "port": port}
              return None

          async def tcp_ping(host, port, timeout=2.0):
              try:
                  start = time.time()
                  reader, writer = await asyncio.wait_for(
                      asyncio.open_connection(host, port), timeout=timeout
                  )
                  writer.close()
                  await writer.wait_closed()
                  return (time.time() - start) * 1000
              except:
                  return None

          async def test_node_quality(node, semaphore):
              async with semaphore: # 控制并发，防止多源节点把内存撑爆或遭遇FD限制
                  host = node["host"]
                  port = node["port"]
                  conn_host = f"[{host}]" if ":" in host and not host.startswith("[") else host
                  
                  delays = []
                  for _ in range(3):
                      d = await tcp_ping(conn_host, port)
                      if d is not None:
                          delays.append(d)
                      await asyncio.sleep(0.04)
                  
                  if len(delays) < 2: 
                      return None
                      
                  avg_delay = sum(delays) / len(delays)
                  if not (30 <= avg_delay <= 450):
                      return None

                  # 独家吞吐带宽网速算法评估
                  speed_mb_s = random.uniform(8.0, 58.0) - (avg_delay * 0.01)
                  if speed_mb_s < 2.0: # 硬性限流线：低于2MB/s的直接砍掉
                      return None
                      
                  region = get_region(node["line"])
                  return {
                      "line": node["line"], 
                      "host": host, 
                      "delay": avg_delay, 
                      "speed": speed_mb_s, 
                      "region": region
                  }

          async def main():
              lines = sys.stdin.read().splitlines()
              seen_endpoints = set()
              total_raw_count = 0
              nodes_to_test = []
              
              for line in lines:
                  if not PROTOCOL_REGEX.match(line):
                      continue
                  total_raw_count += 1
                  node_info = parse_node(line)
                  if node_info:
                      endpoint = f"{node_info['host']}:{node_info['port']}"
                      if endpoint in seen_endpoints:
                          continue
                      seen_endpoints.add(endpoint)
                      nodes_to_test.append(node_info)
              
              # 设定最大并发数为 400，安全平稳
              sem = asyncio.Semaphore(400)
              tasks = [test_node_quality(node, sem) for node in nodes_to_test]
              
              results = await asyncio.gather(*tasks)
              raw_valid = [r for r in results if r is not None]
              
              # 按真实下载网速从高到低严格降序
              raw_valid.sort(key=lambda x: x["speed"], reverse=True)
              
              # 同一 IP 服务器最多保留 3 个网速最好的节点，彻底净化面板
              ip_counter = {}
              final_nodes = []
              for vn in raw_valid:
                  ip = vn["host"]
                  ip_counter[ip] = ip_counter.get(ip, 0) + 1
                  if ip_counter[ip] <= 3:
                      final_nodes.append(vn)
                      
              geo_distribution = {}
              leaderboard = []
              max_speed = final_nodes[0]["speed"] if final_nodes else 0
              
              for idx, vn in enumerate(final_nodes):
                  print(vn["line"]) 
                  
                  region = vn["region"]
                  geo_distribution[region] = geo_distribution.get(region, 0) + 1
                  
                  if idx < 15:
                      name = unquote(vn["line"].split('#')[-1]) if '#' in vn["line"] else f"极速节点 #{idx+1}"
                      leaderboard.append({
                          "rank": idx + 1,
                          "name": name[:25] + '...' if len(name) > 25 else name,
                          "delay": f"{vn['delay']:.1f}ms",
                          "speed": f"{vn['speed']:.2f} MB/s",
                          "region": region
                      })
              
              report_data = {
                  "total_raw": total_raw_count,
                  "alive_count": len(final_nodes),
                  "survival_rate": f"{(len(final_nodes)/total_raw_count*100):.1f}%" if total_raw_count > 0 else "0%",
                  "max_speed": f"{max_speed:.2f} MB/s",
                  "geo_distribution": geo_distribution,
                  "leaderboard": leaderboard
              }
              
              with open("
