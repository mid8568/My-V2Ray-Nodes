name: Auto Fetch Nodes

on:
  workflow_dispatch: # 支持网页手动点击运行
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时在后台自动执行一次

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Execute Script
        run: python fetch_nodes.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 💡 终极修复：保底强制创建，彻底消灭 fatal: pathspec 128 错误
          touch nodes.txt
          
          git add nodes.txt
          if ! git diff --cached --quiet; then
            git commit -m "Auto sync nodes at $(date)"
            git push origin main
          else
            echo "Nodes have no changes."
          fi
