name: Auto Fetch Nodes

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时自动运行一次

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Nodes Using Curl
        run: |
          # 1. 自动计算今天和昨天的北京时间日期 (CST = UTC + 8)
          TODAY=$(date -u -d '+8 hours' +%Y%m%d)
          YESTERDAY=$(date -u -d '+8 hours -1 day' +%Y%m%d)
          
          echo "今天是北京时间: $TODAY"
          echo "昨天是北京时间: $YESTERDAY"
          
          # 2. 精准配置全套绝对合法的全球 CDN 加速镜像和官方 Raw 路径
          urls=(
            "https://jsdelivr.net{TODAY}2"
            "https://jsdelivr.net{TODAY}1"
            "https://githubusercontent.com{TODAY}2"
            "https://githubusercontent.com{TODAY}1"
            "https://jsdelivr.net{YESTERDAY}2"
            "https://jsdelivr.net{YESTERDAY}1"
            "https://githubusercontent.com{YESTERDAY}2"
            "https://githubusercontent.com{YESTERDAY}1"
          )
          
          # 3. 循环轮询每一个正确的网址，直到下载成功
          success=false
          for url in "${urls[@]}"; do
            echo "正在强攻下载通道: $url"
            # -f 遇到错误不下载，-s 静默，-L 自动跟随重定向
            if curl -f -s -L --connect-timeout 10 "$url" > nodes.txt; then
              # 检查文件是否存在且大小大于 100 字节，防止抓到空网页
              if [ -s nodes.txt ] && [ $(wc -c < nodes.txt) -gt 100 ]; then
                echo "【无敌成功】已成功抓取到有效节点数据！"
                success=true
                break
              fi
            fi
          done
          
          if [ "$success" = false ]; then
            echo "【致命错误】所有镜像渠道及官方源均被封锁或目标仓库尚未更新！"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add nodes.txt
          # 允许空提交，确保时间戳一定会刷新
          git commit --allow-empty -m "Auto sync nodes at $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') Beijing Time"
          git push origin main
