name: Auto Fetch Nodes

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时自动运行一次

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Execute Script
        run: python fetch_nodes.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 💡 核心修复：添加并追踪变更
          git add nodes.txt
          
          # 💡 终极修复：允许空提交。即使文件无变化，也强行生成一个带时间戳的新 Commit，确保首页文件绝对刷新
          git commit --allow-empty -m "Auto sync nodes at $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') Beijing Time"
          
          # 强行推送到主分支
          git push origin main
