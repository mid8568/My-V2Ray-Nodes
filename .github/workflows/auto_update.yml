name: 自动更新 V2Ray 节点

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5

      - name: 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 执行节点抓取脚本
        run: python fetch_nodes.py

      - name: 提交并推送到仓库
        env:
          # 显式将官方特权写入令牌作为局部环境变量挂载，供给下方的 git push 命令读取认证
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          git add nodes.txt
          
          if [ -n "$(git status --porcelain nodes.txt)" ]; then
            echo "🚀 成功检测到节点文件状态变更，正在通过认证通道强制推送到主仓..."
            git commit -m "自动更新节点列表: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 【核心修复】：使用官方标准的 https 令牌认证格式重写推送目标，彻底突破 128 权限屏障
            git push https://x-access-token:${GH_TOKEN}@://github.com{{ github.repository }}.git HEAD:main
          else
            echo "💡 节点数据内容未发生任何质变，本次安全跳过推送。"
          fi
