name: Auto Fetch Nodes

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时自动运行一次

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Nodes Using Curl
        run: |
          # 💡 终极绝招：彻底丢弃所有时间变量，将目前绝对存在的、对方每天都在高频更新的固定文件地址全部写死！
          # 这样可以 100% 避开 GitHub Actions 的变量解析冲突漏洞
          urls=(
            "https://githubusercontent.com"
            "https://githubusercontent.com"
            "https://githubusercontent.com"
            "https://githubusercontent.com"
          )
          
          success=false
          for url in "${urls[@]}"; do
            echo "正在强攻安全通道: $url"
            
            # 使用自带重定向跟随和15秒超长超时的原生下载
            if curl -f -s -L --connect-timeout 15 "$url" > nodes.txt; then
              # 只要文件存在，且大小大于 10 字节，立刻判定为抓取成功并破防退出
              if [ -s nodes.txt ] && [ $(wc -c < nodes.txt) -gt 10 ]; then
                echo "【无敌成功】已成功抓取到有效节点数据！"
                success=true
                break
              fi
            fi
          done
          
          if [ "$success" = false ]; then
            echo "【致命错误】由于目标文件不存在或链接改变，本次抓取未成功。"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add nodes.txt
          # 强行生成一个带时间戳的新 Commit
          git commit --allow-empty -m "Auto sync nodes at $(date)"
          git push origin main
